<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icarus</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid #1c1c1c;
      flex-shrink: 0;
      background: #0d0d0d;
    }

    .logo {
      width: 34px;
      height: 34px;
      background: #e8e8e8;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 800;
      color: #0d0d0d;
      letter-spacing: -1px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #f0f0f0;
    }

    .header-info p {
      font-size: 11px;
      color: #555;
      margin-top: 1px;
      letter-spacing: 0.02em;
    }

    .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #555;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #333;
      pointer-events: none;
      text-align: center;
    }

    .empty-logo {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: #161616;
      border: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      color: #3a3a3a;
      letter-spacing: -1px;
      margin-bottom: 4px;
    }

    .empty-state p { font-size: 14px; }
    .empty-state span { font-size: 12px; color: #2a2a2a; }

    /* Message rows */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 78%;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.icarus { align-self: flex-start; align-items: flex-start; }

    .message-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 5px;
    }

    .bubble {
      padding: 11px 15px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #17304f;
      color: #dde8f5;
      border-bottom-right-radius: 4px;
    }

    .message.icarus .bubble {
      background: #161616;
      border: 1px solid #202020;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    /* Markdown inside Icarus bubbles */
    .bubble p { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble strong { color: #f0f0f0; font-weight: 600; }
    .bubble em { font-style: italic; color: #ccc; }
    .bubble a { color: #60a5fa; text-decoration: none; }
    .bubble a:hover { text-decoration: underline; }
    .bubble code {
      background: #0d0d0d;
      color: #93c5fd;
      padding: 1px 5px;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12.5px;
    }
    .bubble pre {
      background: #0d0d0d;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 12px 14px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble pre code { background: none; padding: 0; font-size: 12.5px; color: #a8d0ff; }
    .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
    .bubble li { margin: 3px 0; }
    .bubble h1, .bubble h2, .bubble h3, .bubble h4 {
      color: #f0f0f0;
      font-weight: 600;
      margin: 12px 0 4px;
      line-height: 1.3;
    }
    .bubble h1 { font-size: 16px; }
    .bubble h2 { font-size: 15px; }
    .bubble h3 { font-size: 14px; }
    .bubble h4 { font-size: 13px; }
    .bubble hr { border: none; border-top: 1px solid #252525; margin: 10px 0; }
    .bubble blockquote {
      border-left: 3px solid #2a2a2a;
      padding-left: 12px;
      color: #888;
      margin: 8px 0;
    }

    /* Typing indicator */
    .typing-row {
      align-self: flex-start;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 5px;
    }

    .typing-bubble {
      background: #161616;
      border: 1px solid #202020;
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      padding: 13px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-bubble span {
      width: 6px;
      height: 6px;
      background: #444;
      border-radius: 50%;
      animation: pulse 1.3s ease-in-out infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 60%, 100% { opacity: 0.25; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-3px); }
    }

    /* ── Input area ── */
    .input-area {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid #1c1c1c;
      background: #0d0d0d;
      flex-shrink: 0;
    }

    .textarea-wrap {
      flex: 1;
      background: #141414;
      border: 1px solid #202020;
      border-radius: 12px;
      display: flex;
      align-items: flex-end;
      transition: border-color 0.15s;
    }

    .textarea-wrap:focus-within { border-color: #303030; }

    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #e0e0e0;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.55;
      resize: none;
      padding: 11px 12px;
      max-height: 140px;
      overflow-y: auto;
    }

    textarea::placeholder { color: #3a3a3a; }

    textarea::-webkit-scrollbar { width: 3px; }
    textarea::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    .send-btn {
      width: 38px;
      height: 38px;
      background: #e8e8e8;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-bottom: 2px;
      transition: opacity 0.15s, transform 0.1s;
    }

    .send-btn:hover:not(:disabled) { opacity: 0.85; }
    .send-btn:active:not(:disabled) { transform: scale(0.93); }
    .send-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    .send-btn svg { width: 16px; height: 16px; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .message { max-width: 92%; }
      .messages { padding: 16px 14px; gap: 14px; }
      .input-area { padding: 12px 14px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="logo">I</div>
    <div class="header-info">
      <h1>ICARUS</h1>
      <p>AI Operations Agent · Openclaw</p>
    </div>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Online</span>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="empty-logo">I</div>
      <p>How can I help you today?</p>
      <span>Ask Icarus anything about Openclaw operations.</span>
    </div>
  </div>

  <div class="input-area">
    <div class="textarea-wrap">
      <textarea
        id="input"
        placeholder="Message Icarus…"
        rows="1"
        autofocus
      ></textarea>
    </div>
    <button class="send-btn" id="sendBtn" disabled title="Send message">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0d0d0d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/>
        <polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('input');
    const sendBtn    = document.getElementById('sendBtn');
    let emptyState   = document.getElementById('emptyState');
    let loading      = false;

    // Configure marked
    marked.use({ breaks: true, gfm: true });

    // Auto-grow textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
      sendBtn.disabled = !inputEl.value.trim() || loading;
    });

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) send();
      }
    });

    sendBtn.addEventListener('click', send);

    function removeEmptyState() {
      if (emptyState) {
        emptyState.remove();
        emptyState = null;
      }
    }

    function appendMessage(role, text) {
      removeEmptyState();
      const row = document.createElement('div');
      row.className = `message ${role}`;

      const label = document.createElement('div');
      label.className = 'message-label';
      label.textContent = role === 'user' ? 'You' : 'Icarus';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      if (role === 'icarus') {
        bubble.innerHTML = marked.parse(text);
      } else {
        bubble.textContent = text;
      }

      row.appendChild(label);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      scrollDown();
    }

    function showTyping() {
      removeEmptyState();
      const row = document.createElement('div');
      row.className = 'typing-row';

      const label = document.createElement('div');
      label.className = 'message-label';
      label.textContent = 'Icarus';

      const bub = document.createElement('div');
      bub.className = 'typing-bubble';
      bub.innerHTML = '<span></span><span></span><span></span>';

      row.appendChild(label);
      row.appendChild(bub);
      messagesEl.appendChild(row);
      scrollDown();
      return row;
    }

    function scrollDown() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setStatus(online) {
      const dot  = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      dot.style.background  = online ? '#22c55e' : '#ef4444';
      text.textContent      = online ? 'Online' : 'Error';
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text || loading) return;

      loading = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      inputEl.style.height = 'auto';

      appendMessage('user', text);
      const typingRow = showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });

        typingRow.remove();

        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          appendMessage('icarus', `**Error:** ${body.error || 'Request failed. Please try again.'}`);
          setStatus(false);
        } else {
          const data = await res.json();
          appendMessage('icarus', data.reply || '*(no response)*');
          setStatus(true);
        }
      } catch (err) {
        typingRow.remove();
        appendMessage('icarus', '**Error:** Could not reach Icarus. Check your connection and try again.');
        setStatus(false);
      } finally {
        loading = false;
        sendBtn.disabled = !inputEl.value.trim();
        inputEl.focus();
      }
    }
  </script>
</body>
</html>
